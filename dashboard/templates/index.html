<!DOCTYPE html>
<html>
<head>
    <title>AI Recon Tool</title>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 12px 20px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        h1 {
            color: #38bdf8;
        }

        #loader {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>🛡️ AI Bug Bounty Recon Tool</h1>

<form action="/scan" method="POST" onsubmit="startScan()">
    <input type="text" name="domain" placeholder="Enter target domain" required>
    <br><br>
    <button type="submit">🚀 Start Scan</button>
</form>

<!-- ✅ LOADER -->
<div id="loader" style="display:none; margin-top:20px;">

    <p id="loadingText">🔍 Initializing scan...</p>

    <!-- Progress Bar -->
    <div style="width: 300px; margin: 10px auto; background:#1e293b; border-radius:10px;">
        <div id="progressBar" style="
            width: 0%;
            height: 10px;
            background: #22c55e;
            border-radius: 10px;
            transition: width 0.5s;
        "></div>
    </div>

</div>

<script>
function startScan() {
    document.getElementById("loader").style.display = "block";

    let messages = [
        "🔍 Initializing scan...",
        "🌐 Enumerating subdomains...",
        "🟢 Checking live hosts...",
        "📂 Discovering endpoints...",
        "⚠️ Analyzing vulnerabilities...",
        "🚀 Finalizing results..."
    ];

    let progress = [10, 25, 45, 65, 85, 100];

    let i = 0;

    let interval = setInterval(() => {
        if (i < messages.length) {
            document.getElementById("loadingText").innerText = messages[i];
            document.getElementById("progressBar").style.width = progress[i] + "%";
            i++;
        } else {
            clearInterval(interval);
        }
    }, 800);
}
</script>

</body>
</html>
