<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1e293b;
            padding:40px;
            border-radius:10px;
            width:300px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:10px;
            background:#38bdf8;
            border:none;
            color:white;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="box">

<h2>📝 Register</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<br>

<a href="/login" style="color:#38bdf8;">
Login account
</a>

</div>

</body>
</html>
