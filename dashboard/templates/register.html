<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AI Recon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #080f1a;
            --surface:   #0d1829;
            --border:    #1a2d4a;
            --green:     #00ff88;
            --green-dim: #00cc6a;
            --blue:      #38bdf8;
            --red:       #ff4d6d;
            --text:      #c8d8e8;
            --muted:     #4a6080;
            --mono:      'JetBrains Mono', monospace;
            --sans:      'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px;
        }

        .card-header {
            background: rgba(0,255,136,0.04);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-red   { background: var(--red); }
        .dot-amber { background: #fbbf24; }
        .dot-green { background: var(--green); }

        .card-title {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            margin-left: 4px;
            letter-spacing: 0.05em;
        }

        .card-body { padding: 32px 28px; }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-text {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 700;
            color: #f0f8ff;
        }

        .logo-text span { color: var(--green); }

        .logo-sub {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
            letter-spacing: 0.05em;
        }

        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            pointer-events: none;
            user-select: none;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 12px 12px 12px 36px;
            font-family: var(--mono);
            font-size: 13px;
            color: #f0f8ff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            caret-color: var(--green);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder { color: var(--muted); }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
        }

        input.invalid {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(255,77,109,0.08);
        }

        .field-hint {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: 5px;
        }

        .field-hint.error { color: var(--red); }
        .field-hint.ok    { color: var(--green); }

        /* ── Password strength bar ── */
        .strength-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }

        /* ── Error / success boxes ── */
        .error-box {
            background: rgba(255,77,109,0.06);
            border: 1px solid rgba(255,77,109,0.2);
            border-radius: 3px;
            padding: 10px 14px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--red);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .success-box {
            background: rgba(0,255,136,0.06);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 3px;
            padding: 10px 14px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--green);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit {
            width: 100%;
            background: var(--green);
            color: #080f1a;
            border: none;
            border-radius: 3px;
            padding: 13px;
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            background: var(--green-dim);
            box-shadow: 0 0 20px rgba(0,255,136,0.2);
        }

        .btn-submit:active { transform: translateY(1px); }
        .btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; }

        .card-footer {
            border-top: 1px solid var(--border);
            padding: 16px 28px;
            text-align: center;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        .card-footer a {
            color: var(--blue);
            text-decoration: none;
            transition: color 0.2s;
        }

        .card-footer a:hover { color: var(--green); }

        footer {
            position: relative;
            z-index: 10;
            margin-top: 20px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 13px;
            background: var(--green);
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition: none !important; animation: none !important; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="dot dot-red"></div>
        <div class="dot dot-amber"></div>
        <div class="dot dot-green"></div>
        <span class="card-title">register.sh</span>
    </div>

    <div class="card-body">

        <div class="logo">
            <div class="logo-text"><span>//</span> recon.ai<span class="cursor"></span></div>
            <div class="logo-sub">Create your account</div>
        </div>

        {% if error %}
        <div class="error-box"><span>✗</span><span>{{ error }}</span></div>
        {% endif %}

        {% if success %}
        <div class="success-box"><span>✓</span><span>{{ success }}</span></div>
        {% endif %}

        <form method="POST" id="registerForm" onsubmit="return validateForm()">

            <div class="field">
                <label>Username</label>
                <div class="input-wrap">
                    <span class="input-icon">$</span>
                    <input
                        type="text"
                        name="username"
                        id="username"
                        placeholder="min 3 characters"
                        autocomplete="username"
                        autocapitalize="none"
                        spellcheck="false"
                        minlength="3"
                        required
                        autofocus
                        oninput="validateUsername()"
                    >
                </div>
                <div class="field-hint" id="usernameHint"></div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        placeholder="min 6 characters"
                        autocomplete="new-password"
                        minlength="6"
                        required
                        oninput="validatePassword()"
                    >
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="field-hint" id="passwordHint"></div>
            </div>

            <div class="field">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input
                        type="password"
                        name="confirm_password"
                        id="confirmPassword"
                        placeholder="repeat password"
                        autocomplete="new-password"
                        required
                        oninput="validateConfirm()"
                    >
                </div>
                <div class="field-hint" id="confirmHint"></div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">CREATE ACCOUNT →</button>

        </form>

    </div>

    <div class="card-footer">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>

<footer>use only on authorized targets</footer>

<script>
    function validateUsername() {
        const val   = document.getElementById("username").value.trim();
        const input = document.getElementById("username");
        const hint  = document.getElementById("usernameHint");

        if (val.length === 0) {
            hint.textContent = "";
            input.classList.remove("invalid");
        } else if (val.length < 3) {
            hint.textContent = "✗ Must be at least 3 characters";
            hint.className   = "field-hint error";
            input.classList.add("invalid");
        } else if (!/^[a-zA-Z0-9_\-]+$/.test(val)) {
            hint.textContent = "✗ Only letters, numbers, _ and - allowed";
            hint.className   = "field-hint error";
            input.classList.add("invalid");
        } else {
            hint.textContent = "✓ Looks good";
            hint.className   = "field-hint ok";
            input.classList.remove("invalid");
        }
    }

    function validatePassword() {
        const val  = document.getElementById("password").value;
        const hint = document.getElementById("passwordHint");
        const fill = document.getElementById("strengthFill");

        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^a-zA-Z0-9]/.test(val)) score++;

        const levels = [
            { pct: "0%",   color: "transparent",     label: "" },
            { pct: "25%",  color: "var(--red)",       label: "✗ Weak" },
            { pct: "50%",  color: "#fbbf24",          label: "⚠ Fair" },
            { pct: "75%",  color: "var(--blue)",      label: "~ Good" },
            { pct: "100%", color: "var(--green)",     label: "✓ Strong" },
            { pct: "100%", color: "var(--green)",     label: "✓ Strong" },
        ];

        const level = levels[Math.min(score, 5)];
        fill.style.width      = val.length > 0 ? level.pct : "0%";
        fill.style.background = level.color;
        hint.textContent      = val.length > 0 ? level.label : "";
        hint.className        = score >= 3 ? "field-hint ok" : "field-hint error";

        // Re-validate confirm if already typed
        if (document.getElementById("confirmPassword").value) {
            validateConfirm();
        }
    }

    function validateConfirm() {
        const pwd     = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;
        const input   = document.getElementById("confirmPassword");
        const hint    = document.getElementById("confirmHint");

        if (!confirm) {
            hint.textContent = "";
            input.classList.remove("invalid");
            return;
        }

        if (pwd === confirm) {
            hint.textContent = "✓ Passwords match";
            hint.className   = "field-hint ok";
            input.classList.remove("invalid");
        } else {
            hint.textContent = "✗ Passwords do not match";
            hint.className   = "field-hint error";
            input.classList.add("invalid");
        }
    }

    function validateForm() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const confirm  = document.getElementById("confirmPassword").value;

        if (username.length < 3) {
            document.getElementById("usernameHint").textContent = "✗ Username too short";
            document.getElementById("usernameHint").className   = "field-hint error";
            document.getElementById("username").focus();
            return false;
        }

        if (password.length < 6) {
            document.getElementById("passwordHint").textContent = "✗ Password too short";
            document.getElementById("passwordHint").className   = "field-hint error";
            document.getElementById("password").focus();
            return false;
        }

        if (password !== confirm) {
            document.getElementById("confirmHint").textContent = "✗ Passwords do not match";
            document.getElementById("confirmHint").className   = "field-hint error";
            document.getElementById("confirmPassword").classList.add("invalid");
            document.getElementById("confirmPassword").focus();
            return false;
        }

        return true;
    }
</script>

</body>
</html>
